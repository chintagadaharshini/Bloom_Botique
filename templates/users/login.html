{% extends 'base.html' %}
{% block title %}Login - Bloom Boutique{% endblock %}

{% block content %}
<div style="background: linear-gradient(135deg, var(--vanilla), var(--cream));
            min-height: 80vh; display:flex; align-items:center;">

    <div class="form-container">

        <!-- Header -->
        <div style="text-align:center; margin-bottom:2rem;">
            <span style="font-size:2.5rem;">🌸</span>
            <h2 class="form-title" style="margin-top:0.5rem;">Welcome Back</h2>
            <p class="form-subtitle">Sign in to your Bloom Boutique account</p>
        </div>

        <!-- Login Form -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem;">
                Sign In 🌸
            </button>
        </form>

        <!-- Register Link -->
        <p style="text-align:center; margin-top:1.5rem;
              color:var(--text-light); font-size:0.9rem;">
            Don't have an account?
            <a href="{% url 'register' %}" style="color:var(--dark-purple); font-weight:600;">
                Create one here
            </a>
        </p>

    </div>
</div>
{% endblock %}
